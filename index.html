<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>🎪 Circo Mágico VR</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

/* MENÚ */
#menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    z-index: 10;
    width: 80%;
    max-width: 400px;
}

/* BOTÓN */
#startBtn {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
    z-index: 5;
}

/* BOTÓN VR */
#mobileVR {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00aaff;
    color: white;
    z-index: 5;
}

/* MENSAJE */
#mensaje {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    display: none;
    z-index: 5;
}

</style>

</head>

<body>

<!-- MENÚ -->
<div id="menu">
    <h1>🎪 CIRCO MÁGICO VR</h1>
    <p>Presiona iniciar para entrar al circo</p>
    <button id="startBtn">COMENZAR</button>
</div>

<!-- HUD -->
<div id="hud">
🎮 WASD<br>
🖱 Mouse<br>
📱 Móvil compatible
</div>

<!-- VR BUTTON -->
<button id="mobileVR">📱 VR</button>

<!-- MENSAJE -->
<div id="mensaje"></div>

<!-- THREE.JS (IMPORTANTE: ANTES DEL JS) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.165/build/three.min.js"></script>

<!-- TU JUEGO -->
<script src="./js/main.js"></script>

</body>

</html>
